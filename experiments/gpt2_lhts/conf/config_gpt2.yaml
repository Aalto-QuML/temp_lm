hydra:
  run:
    dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

local_rank: 0
world_size: 1

run: 0
context: 1024
n_epochs: 1
batch: 2
lr: 1e-4
batch_step: 2

model_dir: /m/cs/scratch/temperature_diffusion/models/lhts/
loadpath:
mode: train
gpt_name: gpt2
data_source: data

horizon_loss:
  chunk: 8
  clamp: 3
  kl_beta: 0.05
  T: 0.8

defaults:
  - override hydra/job_logging: custom